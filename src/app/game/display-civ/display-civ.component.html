<div class="d-flex align-items-center gap-3" style="padding: 5px" (click)="clicked.emit(this.civ)">
  <div class="flex-shrink-0">
    <img [src]="imageUrl()" />
  </div>
  <div class="flex-grow-1">
    @if (!civ) {
      <h4 class="mb-0" style="margin-top: 0">Unknown Civ</h4>
    }
    @if (civ) {
      <h4 class="mb-0" style="margin-top: 0">
        {{ civ.fullDisplayName }}
        @if (civ.steamIdNeedsSubstitution) {
          <span style="color: #f00"> (REQUESTED SUBSTITUTION)</span>
        }
      </h4>
    }
  </div>
</div>
