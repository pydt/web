<ng-container>
  <div class="row">
    <div class="col-sm-12">
      <p>Use this to mark a player as requesting substitution so another player can take their spot.</p>
      <select class="form-select" [(ngModel)]="profileToRequestSubstitution">
        @for (profile of profiles; track profile) {
          <option [ngValue]="profile">
            {{ profile.personaname }}
          </option>
        }
      </select>
    </div>
  </div>
  <div class="row" style="margin-top: 20px">
    <div class="col-12 text-center">
      <button type="button" class="btn btn-secondary" (click)="requestSubstitution()">
        {{ substitutionRequested ? "Undo Substitution Request" : "Mark for Substitution" }}
      </button>
    </div>
  </div>
</ng-container>
