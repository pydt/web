<div class="card mt-3">
  <div class="card-header">Change {{ steamId ? "" : "Your" }} Civ</div>
  <div class="card-body">
    @if (!steamId) {
      <p>If you want to change your civ before the game starts, use the selector below...</p>
    }
    @if (steamId) {
      <p>Use the selector below to change this player's civ...</p>
    }
    <pydt-select-civ
      [leaders]="availableCivs"
      [availableCivilizations]="availableCivilizations"
      [civGame]="civGame"
      [randomOnly]="game.randomOnly"
      [curCiv]="playerCiv"
      [curCivilization]="playerCivilization"
      (selectedCiv)="changeCiv($event)"
      (selectedCivilization)="changeCivilization($event)"
    ></pydt-select-civ>
  </div>
</div>
