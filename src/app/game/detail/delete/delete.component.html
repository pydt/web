<div class="card mt-3">
  <div class="card-header">Delete Game</div>
  <div class="card-body">
    <p>To delete this game before it starts, click the button below.</p>
    <div class="row">
      <div class="col-12 text-center">
        <button type="button" class="btn btn-danger" (click)="confirmDeleteModal.show()">Delete Game</button>
      </div>
    </div>
  </div>
</div>

<div
  bsModal
  #confirmDeleteModal="bs-modal"
  class="modal fade"
  tabindex="-1"
  role="dialog"
  aria-labelledby="confirmDeleteModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-sm">
    <div class="modal-content">
      <div class="modal-header">
        <h4 class="modal-title">Are you sure?</h4>
        <button type="button" class="btn-close" aria-label="Close" (click)="confirmDeleteModal.hide()"></button>
      </div>
      <div class="modal-body">
        Do you really want to delete {{ game?.displayName }}? <b>THIS ACTION IS IRREVERSIBLE!</b>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="confirmDeleteModal.hide()">Cancel</button>
        <button type="button" class="btn btn-danger" (click)="delete()">Delete Game!</button>
      </div>
    </div>
  </div>
</div>
