<div class="container">
  @if (games) {
    <div style="position: relative">
      <h1>Your Games</h1>
      <button
        type="button"
        class="btn btn-sm btn-default"
        [disabled]="refreshDisabled"
        style="position: absolute; top: 55px; right: 0px"
        (click)="refresh()"
      >
        Refresh
      </button>
      <tabset>
        <tab heading="Active Games">
          @if (!games.length) {
            <h3>No games found.</h3>
          }
          @for (game of games; track game) {
            <div>
              <div class="well">
                <pydt-game-preview [game]="game" [showTurnInfo]="true"></pydt-game-preview>
                <div class="row">
                  <div class="col-xs-12 text-center">
                    <button type="button" class="btn btn-primary" [routerLink]="['/game', game.gameId]">
                      View Game Details
                    </button>
                  </div>
                </div>
              </div>
            </div>
          }
        </tab>
        <tab heading="Completed Games" (selectTab)="getCompetedGames()">
          @if (!completedGames) {
            <h1 style="text-align: center">Loading...</h1>
          }
          @if (completedGames) {
            @if (!completedGames.length) {
              <h3>No completed games found.</h3>
            }
            @for (game of completedGames; track game) {
              <div>
                <div class="well">
                  <pydt-game-preview [game]="game"></pydt-game-preview>
                  <div class="row">
                    <div class="col-xs-12 text-center">
                      <button type="button" class="btn btn-primary" [routerLink]="['/game', game.gameId]">
                        View Game Details
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            }
          }
        </tab>
      </tabset>
      <hr />
      <h1>Create a New Game</h1>
      <div class="row">
        <div class="col-xs-12 text-center">
          <pydt-game-create-button></pydt-game-create-button>
        </div>
      </div>
    </div>
  }
</div>
