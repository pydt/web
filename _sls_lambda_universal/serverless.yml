service: pydt-universal-www

frameworkVersion: "4"

plugins:
  - serverless-apigw-binary

provider:
  name: aws
  runtime: nodejs22.x
  memorySize: 1024
  timeout: 30
  stage: dev
  environment:
    ROLLBAR_SERVER_API_KEY: ${env:ROLLBAR_SERVER_API_KEY}
    ROLLBAR_ENV: ${opt:stage, self:provider.stage}
    # CloudFront's custom origin sends the execute-api hostname as Host, not the public
    # domain, so Angular SSR's allowed-hosts check needs it explicitly (any API ID, this region).
    NG_ALLOWED_HOSTS: "*.execute-api.us-east-1.amazonaws.com"
    # API Gateway always attaches x-forwarded-for/-port; Angular SSR only trusts x-forwarded-host/-proto
    # by default and silently deopts to CSR (skipping per-request rendering) when it sees an untrusted one.
    NG_TRUST_PROXY_HEADERS: "x-forwarded-for,x-forwarded-host,x-forwarded-port,x-forwarded-proto"

custom:
  apigwBinary:
    types:
      - "*/*"

functions:
  api:
    handler: pydt-universal.handler
    events:
      - http: GET /{proxy+}
      - http: GET /
